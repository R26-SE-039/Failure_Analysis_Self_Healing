version: "3.9"

services:

  # ── PostgreSQL Database ──────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: nextgenqa-db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: Shani
      POSTGRES_DB:       failure_analysis_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── ML Classifier Service (port 8001) ────────────────────────────────────────
  ml-service:
    build:
      context: ./services/ml-service
      dockerfile: Dockerfile
    container_name: nextgenqa-ml
    restart: unless-stopped
    ports:
      - "8001:8001"
    volumes:
      - ./services/ml-service/models:/app/models
      - ./research:/research
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Self-Healing Service (port 8002) ─────────────────────────────────────────
  healing-service:
    build:
      context: ./services/healing-service
      dockerfile: Dockerfile
    container_name: nextgenqa-healing
    restart: unless-stopped
    ports:
      - "8002:8002"
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8002/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Analytics Service (port 8003) ────────────────────────────────────────────
  analytics-service:
    build:
      context: ./services/analytics-service
      dockerfile: Dockerfile
    container_name: nextgenqa-analytics
    restart: unless-stopped
    ports:
      - "8003:8003"
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8003/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Notification Service (port 8004) ─────────────────────────────────────────
  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    container_name: nextgenqa-notification
    restart: unless-stopped
    ports:
      - "8004:8004"
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8004/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── API Gateway (port 8000) ──────────────────────────────────────────────────
  gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nextgenqa-gateway
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL:             postgresql://postgres:Shani@postgres:5432/failure_analysis_db
      ML_SERVICE_URL:           http://ml-service:8001
      HEALING_SERVICE_URL:      http://healing-service:8002
      ANALYTICS_SERVICE_URL:    http://analytics-service:8003
      NOTIFICATION_SERVICE_URL: http://notification-service:8004
      PYTHONUNBUFFERED: "1"
    depends_on:
      postgres:
        condition: service_healthy
      ml-service:
        condition: service_started
      healing-service:
        condition: service_started
      analytics-service:
        condition: service_started
      notification-service:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Frontend (port 3000) ─────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nextgenqa-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    depends_on:
      - gateway

volumes:
  postgres_data:
